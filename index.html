<!-- @format -->
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Cossette+Texte:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <title>Show do Milhão</title>

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
  </head>

  <body>
    <!-- Logo -->
    <img id="logo" src="assets/SHOW_SHOW_SHOW_DA_MATEMATICA.png" />

    <!-- Menu -->
    <div id="menu">
      <p>Selecione a dificuldade:</p>

      <div>
        <button id="ENSINO_FUNDAMENTAL_II">Ensino Fundamental II</button>
        <button id="ENSINO_MÉDIO">Ensino Médio</button>
        <button id="GRADUAÇÃO">Graduação</button>
      </div>
    </div>

    <!-- Pergunta -->
    <div id="grupo-btn">
      <div id="grupo-pergunta">
        <div id="pergunta">
          <img
            id="img-pergunta"
            src="imagem/Imagem_ENSINO_FUNDAMENTAL_II_90.jpg"
            width="200"
          />
          <p id="texto-pergunta">Qual é a figura geométrica com 3 lados?</p>
        </div>

        <!-- Botões de Ajuda -->
        <div id="ajudas-container">
          <button id="btn-pular" class="btn-ajuda">⏩ Pular Pergunta</button>
          <button id="btn-universitario" class="btn-ajuda">
            🎓 Universitários
          </button>
          <button id="btn-eliminar" class="btn-ajuda">
            ❌ Eliminar Errada
          </button>
        </div>
      </div>

      <!-- Alternativas -->
      <div id="grupo-alternativas">
        <button id="btn-a" class="alternativa" data-letra="a">
          <p>Triângulo</p>
        </button>
        <button id="btn-b" class="alternativa" data-letra="b">
          <p>Retângulo</p>
        </button>
        <button id="btn-c" class="alternativa" data-letra="c">
          <p>Quadrado</p>
        </button>
        <button id="btn-d" class="alternativa" data-letra="d">
          <p>Cachorro</p>
        </button>
      </div>
    </div>

    <!-- Tela Final -->
    <div id="final" hidden>
      <p id="final-mensagem">Acabou</p>
      <div class="tela-final-botoes">
        <button id="btn-reset" class="btn-reset">🔄 Jogar Novamente</button>
      </div>
    </div>

    <!-- Card Erro -->
    <div id="erro" class="card">
      <img src="assets/long-tears.gif" alt="❌" />
      <h1>Resposta Errada!</h1>
      <p id="resposta-certa">A resposta certa era...</p>
    </div>

    <!-- Card Acerto -->
    <div id="acerto" class="card">
      <img src="assets/applause.gif" alt="✅" />
      <h1>Resposta Certa!</h1>
    </div>

    <!-- Card Pular -->
    <div id="card-pular" class="card">
      <img
        src="assets/skip.gif"
        alt="⏩"
        onerror="this.src='https://cdn-icons-png.flaticon.com/512/4782/4782706.png'"
      />
      <h1>Pergunta Pulada!</h1>
      <p id="resposta-pular">A resposta certa era...</p>
      <button onclick="fecharCardPular()">Continuar</button>
    </div>

    <!-- Card Universitários -->
    <div id="card-universitario" class="card">
      <img
        src="assets/nerd.gif"
        alt="🎓"
        onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png'"
      />
      <h1>Ajuda dos Universitários</h1>
      <button onclick="fecharCardUniversitario()">Fechar</button>
    </div>

    <!-- Pontuação -->
    <div id="footer">
      <p id="nro_pergunta">Pergunta X/X</p>
      <p id="pontos">Pontos: 0</p>
    </div>

    <script type="module">
      // =========================================================
      // ELEMENTOS
      // =========================================================

      const menu = document.getElementById("menu");
      const grupo_btn = document.getElementById("grupo-btn");
      const pergunta = document.getElementById("pergunta");
      const texto_pergunta = document.getElementById("texto-pergunta");
      const img_pergunta = document.getElementById("img-pergunta");

      const botao_a = document.getElementById("btn-a");
      const botao_b = document.getElementById("btn-b");
      const botao_c = document.getElementById("btn-c");
      const botao_d = document.getElementById("btn-d");

      const botoes = [botao_a, botao_b, botao_c, botao_d];

      const elemento_pontos = document.getElementById("pontos");
      const nro_pergunta = document.getElementById("nro_pergunta");

      const erro = document.getElementById("erro");
      const resposta_certa = document.getElementById("resposta-certa");

      const acerto = document.getElementById("acerto");

      const finalDiv = document.getElementById("final");
      const finalMensagem = document.getElementById("final-mensagem");

      // Botões de ajuda
      const btnPular = document.getElementById("btn-pular");
      const btnUniversitario = document.getElementById("btn-universitario");
      const btnEliminar = document.getElementById("btn-eliminar");
      const btnReset = document.getElementById("btn-reset");

      // Cards de ajuda
      const cardPular = document.getElementById("card-pular");
      const cardUniversitario = document.getElementById("card-universitario");
      const respostaPular = document.getElementById("resposta-pular");

      // =========================================================
      // ÁUDIOS
      // =========================================================

      const audio_pergunta = new Audio("assets/perguntashowdomilhao.mp3");
      const audio_certo = new Audio("assets/certa-resposta-show-do-milhao.mp3");
      const audio_errado = new Audio("assets/errou-show-do-milhao.mp3");

      // =========================================================
      // ESTADO DO JOGO
      // =========================================================

      let lista_perguntas = [];
      let pergunta_atual = {};
      let index_pergunta = -1;
      let pontos = 0;
      let musica_de_fundo = null;
      let nivelSelecionado = "";

      // Estado das ajudas (usadas apenas uma vez)
      let ajudasUsadas = {
        pular: false,
        universitario: false,
        eliminar: false,
      };

      // Estado da eliminação (botão que foi eliminado)
      let botoesEliminados = [];

      // =========================================================
      // CONFIGURAÇÃO INICIAL
      // =========================================================

      erro.style.opacity = 0;
      erro.style.transform = "translate(-50%, -50%) scale(0.5)";
      erro.style.display = "none";
      erro.style.pointerEvents = "none";

      acerto.style.opacity = 0;
      acerto.style.transform = "translate(-50%, -50%) scale(0.5)";
      acerto.style.display = "none";
      acerto.style.pointerEvents = "none";

      cardPular.style.opacity = 0;
      cardPular.style.transform = "translate(-50%, -50%) scale(0.5)";
      cardPular.style.display = "none";
      cardPular.style.pointerEvents = "none";

      cardUniversitario.style.opacity = 0;
      cardUniversitario.style.transform = "translate(-50%, -50%) scale(0.5)";
      cardUniversitario.style.display = "none";
      cardUniversitario.style.pointerEvents = "none";

      botoes.forEach((btn) => {
        btn.onclick = onButtonClick;
      });

      Array.from(menu.children[1].children).forEach((botao) => {
        botao.onclick = () => selecionaNivel(botao.id);
      });

      // Eventos dos botões de ajuda
      btnPular.onclick = usarPular;
      btnUniversitario.onclick = usarUniversitario;
      btnEliminar.onclick = usarEliminar;
      btnReset.onclick = resetarJogo;

      // Função para fechar cards de ajuda
      window.fecharCardPular = function () {
        cardPular.style.opacity = 0;
        cardPular.style.transform = "translate(-50%, -50%) scale(0.5)";
        setTimeout(() => {
          cardPular.style.display = "none";
          cardPular.style.pointerEvents = "none";
          atualizarPergunta();
        }, 300);
      };

      window.fecharCardUniversitario = function () {
        cardUniversitario.style.opacity = 0;
        cardUniversitario.style.transform = "translate(-50%, -50%) scale(0.5)";
        setTimeout(() => {
          cardUniversitario.style.display = "none";
          cardUniversitario.style.pointerEvents = "none";
        }, 300);
      };

      // =========================================================
      // FUNÇÕES
      // =========================================================

      async function carrega_perguntas(nivel) {
        let perguntas_response = await fetch(`Perguntas_${nivel}.csv`);
        let perguntas_text = await perguntas_response.text();

        const linhas = perguntas_text.split("\n");

        lista_perguntas = linhas
          .filter((linha) => linha.trim() !== "")
          .map((linha) => {
            const [pergunta, opcoes, index, imagem] = linha.split(";");
            return {
              pergunta: pergunta.trim(),
              opcoes: opcoes.split(",").map((opcao) => opcao.trim()),
              indice_correto: Number(index),
              imagem: imagem.trim(),
            };
          });

        lista_perguntas = shuffle(lista_perguntas).slice(0, 10);
      }

      function shuffle(arr) {
        let nova_arr = [...arr];
        for (let i = 0; i < arr.length; i++) {
          const x = Math.floor(Math.random() * arr.length);
          const y = Math.floor(Math.random() * arr.length);
          [nova_arr[x], nova_arr[y]] = [nova_arr[y], nova_arr[x]];
        }
        return nova_arr;
      }

      function selecionaNivel(nivel) {
        nivelSelecionado = nivel;

        musica_de_fundo = new Audio("assets/suspense-show-do-milhao.mp3");
        musica_de_fundo.loop = true;
        musica_de_fundo.play();

        menu.style.display = "none";
        grupo_btn.style.display = "flex";

        // Resetar ajudas ao selecionar novo nível
        ajudasUsadas = {
          pular: false,
          universitario: false,
          eliminar: false,
        };
        botoesEliminados = [];

        // Reativar botões de ajuda
        btnPular.disabled = false;
        btnUniversitario.disabled = false;
        btnEliminar.disabled = false;

        // Resetar estilo dos botões
        botoes.forEach((btn) => {
          btn.classList.remove("disabled-option");
        });

        carrega_perguntas(nivel).then(() => {
          index_pergunta = -1;
          pontos = 0;
          elemento_pontos.innerText = `Pontos: ${pontos}`;
          atualizarPergunta();
        });
      }

      function atualizarPergunta() {
        index_pergunta += 1;

        if (index_pergunta >= lista_perguntas.length) {
          finalizarJogo();
          return;
        }

        audio_pergunta.play();

        pergunta_atual = lista_perguntas[index_pergunta];

        nro_pergunta.innerText = `Pergunta ${index_pergunta + 1}/10`;

        let novas_opcoes = shuffle(pergunta_atual.opcoes);

        texto_pergunta.innerText = pergunta_atual.pergunta;

        if (pergunta_atual.imagem && pergunta_atual.imagem !== "") {
          img_pergunta.style.display = "flex";
          img_pergunta.src = pergunta_atual.imagem;
        } else {
          img_pergunta.style.display = "none";
        }

        botao_a.firstElementChild.innerText = novas_opcoes[0];
        botao_b.firstElementChild.innerText = novas_opcoes[1];
        botao_c.firstElementChild.innerText = novas_opcoes[2];
        botao_d.firstElementChild.innerText = novas_opcoes[3];

        botao_a.disabled = false;
        botao_b.disabled = false;
        botao_c.disabled = false;
        botao_d.disabled = false;

        // Restaurar botões eliminados (limpar estilo)
        botoes.forEach((btn) => {
          btn.classList.remove("disabled-option");
        });
        botoesEliminados = [];

        // Se a ajuda de eliminação já foi usada, não faz nada agora
        // A eliminação é aplicada na hora do clique, não persiste entre perguntas
      }

      function finalizarJogo() {
        pergunta.hidden = true;
        botoes.forEach((btn) => {
          btn.hidden = true;
          btn.style.display = "none";
        });
        grupo_btn.style.display = "none";

        // Esconder botões de ajuda também
        const ajudasContainer = document.querySelector(".ajudas-container");
        if (ajudasContainer) {
          ajudasContainer.style.display = "none";
        }

        finalDiv.hidden = false;
        finalMensagem.innerText = `PARABÉNS!\nVocê fez ${pontos}/10 pontos!`;

        if (musica_de_fundo) {
          musica_de_fundo.pause();
        }
      }

      function resetarJogo() {
        // Esconder tela final
        finalDiv.hidden = true;

        // Mostrar menu novamente
        menu.style.display = "flex";

        // Resetar elementos visuais
        pergunta.hidden = false;
        botoes.forEach((btn) => {
          btn.hidden = false;
          btn.style.display = "flex";
          btn.classList.remove("disabled-option");
        });

        // Mostrar container de ajudas
        const ajudasContainer = document.querySelector(".ajudas-container");
        if (ajudasContainer) {
          ajudasContainer.style.display = "flex";
        }

        // Resetar estado
        lista_perguntas = [];
        index_pergunta = -1;
        pontos = 0;
        elemento_pontos.innerText = `Pontos: ${pontos}`;
        ajudasUsadas = {
          pular: false,
          universitario: false,
          eliminar: false,
        };
        botoesEliminados = [];

        btnPular.disabled = false;
        btnUniversitario.disabled = false;
        btnEliminar.disabled = false;

        if (musica_de_fundo) {
          musica_de_fundo.pause();
          musica_de_fundo = null;
        }
      }

      function mostrarAcerto() {
        acerto.style.display = "flex";
        acerto.style.pointerEvents = "auto";
        acerto.style.opacity = 1;
        acerto.style.transform = "translate(-50%, -50%) scale(1)";

        setTimeout(() => {
          acerto.style.opacity = 0;
          acerto.style.transform = "translate(-50%, -50%) scale(0.5)";
          atualizarPergunta();
          setTimeout(() => {
            acerto.style.display = "none";
            acerto.style.pointerEvents = "none";
          }, 300);
        }, 1000);
      }

      function mostrarErro() {
        resposta_certa.innerText = `A resposta certa era ${
          pergunta_atual.opcoes[pergunta_atual.indice_correto]
        }`;
        erro.style.display = "flex";
        erro.style.pointerEvents = "auto";
        erro.style.opacity = 1;
        erro.style.transform = "translate(-50%, -50%) scale(1)";

        setTimeout(() => {
          erro.style.opacity = 0;
          erro.style.transform = "translate(-50%, -50%) scale(0.5)";
          atualizarPergunta();
          setTimeout(() => {
            erro.style.display = "none";
            erro.style.pointerEvents = "none";
          }, 300);
        }, 2000);
      }

      // =========================================================
      // FUNÇÕES DAS AJUDAS
      // =========================================================

      function usarPular() {
        if (ajudasUsadas.pular) return;

        ajudasUsadas.pular = true;
        btnPular.disabled = true;

        // Mostrar card com a resposta certa
        respostaPular.innerText = `A resposta certa era: ${
          pergunta_atual.opcoes[pergunta_atual.indice_correto]
        }`;

        cardPular.style.display = "flex";
        cardPular.style.pointerEvents = "auto";
        cardPular.style.opacity = 1;
        cardPular.style.transform = "translate(-50%, -50%) scale(1)";

        // Não atualiza pontuação
        // O card fecha e chama atualizarPergunta
      }

      function usarUniversitario() {
        if (ajudasUsadas.universitario) return;

        ajudasUsadas.universitario = true;
        btnUniversitario.disabled = true;

        // Gerar uma dica sobre a resposta correta
        const respostaCorreta =
          pergunta_atual.opcoes[pergunta_atual.indice_correto];

        cardUniversitario.style.display = "flex";
        cardUniversitario.style.pointerEvents = "auto";
        cardUniversitario.style.opacity = 1;
        cardUniversitario.style.transform = "translate(-50%, -50%) scale(1)";
      }

      function usarEliminar() {
        if (ajudasUsadas.eliminar) return;

        // Encontrar as opções erradas (todas exceto a correta)
        const respostaCorreta =
          pergunta_atual.opcoes[pergunta_atual.indice_correto];
        const opcoesErradas = pergunta_atual.opcoes.filter(
          (op) => op !== respostaCorreta
        );

        // Selecionar uma opção errada aleatória para eliminar
        if (opcoesErradas.length > 0) {
          const opcaoEliminar =
            opcoesErradas[Math.floor(Math.random() * opcoesErradas.length)];

          // Encontrar qual botão tem esse texto e desabilitar
          botoes.forEach((btn) => {
            if (
              btn.firstElementChild.innerText.toUpperCase() ===
              opcaoEliminar.toUpperCase()
            ) {
              btn.disabled = true;
              botoesEliminados.push(btn);
            }
          });

          ajudasUsadas.eliminar = true;
          btnEliminar.disabled = true;

          // Mostrar feedback visual rápido (opcional)
          const feedback = document.createElement("div");
          feedback.style.position = "fixed";
          feedback.style.bottom = "20px";
          feedback.style.right = "20px";
          feedback.style.background = "#ffd700";
          feedback.style.color = "#1a1a2e";
          feedback.style.padding = "10px 20px";
          feedback.style.borderRadius = "10px";
          feedback.style.fontWeight = "bold";
          feedback.style.zIndex = "999";
          feedback.innerText = "❌ Uma alternativa errada foi eliminada!";
          document.body.appendChild(feedback);

          setTimeout(() => {
            feedback.remove();
          }, 2000);
        }
      }

      function onButtonClick(e) {
        // Verificar se o botão clicado está desabilitado (eliminado)
        const botaoClicado = e.currentTarget;
        if (botaoClicado.classList.contains("disabled-option")) {
          return; // Botão eliminado, não pode clicar
        }

        let resposta = botaoClicado.firstElementChild.innerText;
        const resposta_correta =
          pergunta_atual.opcoes[pergunta_atual.indice_correto];

        if (resposta_correta.toLowerCase() === resposta.toLowerCase()) {
          pontos += 1;
          elemento_pontos.innerText = `Pontos: ${pontos}`;
          audio_certo.play();
          mostrarAcerto();
        } else {
          audio_errado.play();
          mostrarErro();
        }
      }
    </script>
  </body>
</html>
